name: 企业微信新闻推送机器人

on:
  # 定时触发（北京时间：9:00、12:00、18:00）
  schedule:
    - cron: '0 1 * * *'  # 上午9:00
    - cron: '0 4 * * *'  # 中午12:00
    - cron: '0 10 * * *' # 下午18:00
  # 允许手动触发（用于测试）
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行新闻推送脚本
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          NEWS_API_URL: ${{ secrets.NEWS_API_URL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python news_push_bot.py  # ✅ 修改这里：去掉 docs/ 前缀
